imports:
    - { resource: config_dev.yaml }
    - { resource: parameters_test.yaml }
    - { resource: services_test.yaml }

parameters:
    fosuser_registration: true

framework:
    test: ~
    session:
        storage_id: session.storage.mock_file
    profiler:
        collect: false

web_profiler:
    toolbar: false
    intercept_redirects: false

doctrine:
    dbal:
        dbname_suffix: '_test' # for MySQL and PostgreSQL

    orm:
        metadata_cache_driver:
            type: service
            id: filesystem_cache
        query_cache_driver:
            type: service
            id: filesystem_cache
