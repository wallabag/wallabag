      - name: "Upload functional test results to Codecov"
        if: ${{ !cancelled() }}
        uses: "codecov/codecov-action@v6"
        continue-on-error: true
        with:
          token: "${{ secrets.CODECOV_TOKEN }}"
          report_type: "test_results"
          files: ".coverage/functional.junit.xml"
          flags: "functional,php-${{ matrix.php }},db-${{ matrix.database }},run-no-prefix"
          name: "phpunit-no-prefix-test-results-functional-php${{ matrix.php }}-${{ matrix.database }}"
          disable_search: true
          fail_ci_if_error: false

  phpunit-without-rmq-redis:
    name: "PHP ${{ matrix.php }} using ${{ matrix.database }} without Rabbit & Redis"
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: >-
        ${{ matrix.database == 'mysql' && 'mysql://root:root@127.0.0.1:3306/wallabag?charset=utf8mb4'
         || matrix.database == 'pgsql' && 'postgresql://wallabag:wallabagrocks@127.0.0.1:5432/wallabag?charset=utf8'
         || format('sqlite:///{0}/data/db/wallabag_test.sqlite', github.workspace) }}

    strategy:
      fail-fast: false
      matrix:
        php:
          - "8.3"
        database:
          - "sqlite"
          - "mysql"
          - "pgsql"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 2

      - name: "Install PHP"
