          name: "phpunit-without-rmq-redis-test-results-functional-php${{ matrix.php }}-${{ matrix.database }}"
          disable_search: true
          fail_ci_if_error: false

  bundle-analysis:
    name: "Bundle analysis"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 2

      - name: "Detect changed bundle-relevant files"
        id: changed-files
        uses: tj-actions/changed-files@v47.0.5
        with:
          files: |
            webpack.config.js
            postcss.config.js
            package.json
            yarn.lock
            .nvmrc
            assets/**

      - name: "Install Node"
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: 'yarn'

      - name: "Install dependencies with Yarn"
        if: steps.changed-files.outputs.any_changed == 'true'
        run: yarn install

      - name: "Build assets and upload bundle analysis"
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: yarn build:prod

  codecov-notify:
    name: "Notify Codecov"
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    needs:
      - phpunit
      - phpunit_no_prefix
      - phpunit-without-rmq-redis

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 2

      - name: "Send Codecov notifications"
        uses: "codecov/codecov-action@v6"
        continue-on-error: true
        with:
          token: "${{ secrets.CODECOV_TOKEN }}"
          run_command: "send-notifications"
          fail_ci_if_error: false
