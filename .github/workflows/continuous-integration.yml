        with:
          token: "${{ secrets.CODECOV_TOKEN }}"
          files: ".coverage/unit.xml"
          flags: "unit"
          name: "phpunit-without-rmq-redis-unit-php${{ matrix.php }}-${{ matrix.database }}"
          disable_search: true
          fail_ci_if_error: false

      - name: "Upload unit test results to Codecov"
