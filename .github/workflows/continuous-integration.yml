          fail_ci_if_error: false

      - name: "Upload integration test results to Codecov"
        if: ${{ !cancelled() }}
        uses: "codecov/codecov-action@v6"
        continue-on-error: true
        with:
          token: "${{ secrets.CODECOV_TOKEN }}"
