name: "CI"

on:
  pull_request:
  push:
    branches:
      - master
      - "2.**"

env:
  # Force disabling the reporting of Doctrine deprecation notices for now
  DOCTRINE_DEPRECATIONS: none
  PGPASSWORD: wallabagrocks
  COMPOSER_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  phpunit:
    name: "PHP ${{ matrix.php }} using ${{ matrix.database }}"
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: >-
        ${{ matrix.database == 'mysql' && 'mysql://root:root@127.0.0.1:3306/wallabag?charset=utf8mb4'
         || matrix.database == 'pgsql' && 'postgresql://wallabag:wallabagrocks@127.0.0.1:5432/wallabag?charset=utf8'
         || format('sqlite:///{0}/data/db/wallabag_test.sqlite', github.workspace) }}
    services:
      rabbitmq:
        image: rabbitmq:3-alpine
        ports:
          - 5672:5672
      redis:
        image: redis:6-alpine
        ports:
          - 6379:6379

    strategy:
      fail-fast: false
      matrix:
        php:
          - "8.2"
          - "8.3"
          - "8.4"
        database:
          - "sqlite"
          - "mysql"
          - "pgsql"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 2

      - name: "Install PHP"
        uses: "shivammathur/setup-php@v2"
        with:
          php-version: "${{ matrix.php }}"
          coverage: pcov
          tools: pecl
          extensions: json, pdo, pdo_mysql, pdo_sqlite, pdo_pgsql, curl, imagick, pgsql, gd, tidy
          ini-values: "date.timezone=Europe/Paris"

      - name: "Install Node"
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: 'yarn'

      - name: "Setup MySQL"
        if: "${{ matrix.database == 'mysql' }}"
        run: |
          sudo systemctl start mysql.service
          sudo mysql -u root -proot -h 127.0.0.1 -e "CREATE DATABASE wallabag_test"

      - name: "Setup PostgreSQL"
        if: "${{ matrix.database == 'pgsql' }}"
        run: |
          sudo systemctl start postgresql
          sudo -u postgres psql -d template1 -c "CREATE USER wallabag WITH PASSWORD 'wallabagrocks' CREATEDB"
          createdb -h localhost -p 5432 -U wallabag wallabag_test
          pg_isready -d wallabag_test -h localhost -p 5432 -U wallabag

      - name: "Install dependencies with Composer"
        uses: "ramsey/composer-install@v4"
        with:
          composer-options: "--optimize-autoloader --prefer-dist"

      - name: "Install dependencies with Yarn"
        run: yarn install

      - name: "Build assets with Yarn"
        run: yarn build:dev

      - name: "Prepare coverage output directory"
        run: mkdir -p .coverage

      - name: "Run PHPUnit unit tests"
        run: "php bin/phpunit --testsuite unit -v --coverage-clover=.coverage/unit.xml --log-junit=.coverage/unit.junit.xml"

      - name: "Upload unit coverage to Codecov"
        if: ${{ !cancelled() }}
        uses: "codecov/codecov-action@v6"
        continue-on-error: true
        with:
          token: "${{ secrets.CODECOV_TOKEN }}"
          files: ".coverage/unit.xml"
          flags: "unit"
          name: "phpunit-unit-php${{ matrix.php }}-${{ matrix.database }}"
          disable_search: true
          fail_ci_if_error: false

      - name: "Upload unit test results to Codecov"
        if: ${{ !cancelled() }}
        uses: "codecov/codecov-action@v6"
        continue-on-error: true
        with:
          token: "${{ secrets.CODECOV_TOKEN }}"
          report_type: "test_results"
          files: ".coverage/unit.junit.xml"
          flags: "unit,php-${{ matrix.php }},db-${{ matrix.database }},run-default"
          name: "phpunit-test-results-unit-php${{ matrix.php }}-${{ matrix.database }}"
          disable_search: true
          fail_ci_if_error: false

      - name: "Run PHPUnit integration tests"
        if: ${{ !cancelled() }}
        run: "php bin/phpunit --testsuite integration -v --coverage-clover=.coverage/integration.xml --log-junit=.coverage/integration.junit.xml"

      - name: "Upload integration coverage to Codecov"
        if: ${{ !cancelled() }}
        uses: "codecov/codecov-action@v6"
        continue-on-error: true
        with:
          token: "${{ secrets.CODECOV_TOKEN }}"
          files: ".coverage/integration.xml"
          flags: "integration"
          name: "phpunit-integration-php${{ matrix.php }}-${{ matrix.database }}"
          disable_search: true
          fail_ci_if_error: false

      - name: "Upload integration test results to Codecov"
        if: ${{ !cancelled() }}
        uses: "codecov/codecov-action@v6"
        continue-on-error: true
        with:
          token: "${{ secrets.CODECOV_TOKEN }}"
          report_type: "test_results"
          files: ".coverage/integration.junit.xml"
          flags: "integration,php-${{ matrix.php }},db-${{ matrix.database }},run-default"
          name: "phpunit-test-results-integration-php${{ matrix.php }}-${{ matrix.database }}"
          disable_search: true
          fail_ci_if_error: false

      - name: "Run PHPUnit functional tests"
        if: ${{ !cancelled() }}
        run: "php bin/phpunit --testsuite functional -v --coverage-clover=.coverage/functional.xml --log-junit=.coverage/functional.junit.xml"

      - name: "Upload functional coverage to Codecov"
        if: ${{ !cancelled() }}
        uses: "codecov/codecov-action@v6"
        continue-on-error: true
        with:
          token: "${{ secrets.CODECOV_TOKEN }}"
          files: ".coverage/functional.xml"
          flags: "functional"
          name: "phpunit-functional-php${{ matrix.php }}-${{ matrix.database }}"
          disable_search: true
          fail_ci_if_error: false

      - name: "Upload functional test results to Codecov"
        if: ${{ !cancelled() }}
        uses: "codecov/codecov-action@v6"
        continue-on-error: true
        with:
          token: "${{ secrets.CODECOV_TOKEN }}"
          report_type: "test_results"
          files: ".coverage/functional.junit.xml"
          flags: "functional,php-${{ matrix.php }},db-${{ matrix.database }},run-default"
          name: "phpunit-test-results-functional-php${{ matrix.php }}-${{ matrix.database }}"
          disable_search: true
          fail_ci_if_error: false

