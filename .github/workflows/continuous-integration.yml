          report_type: "test_results"
          files: ".coverage/unit.junit.xml"
          flags: "unit,php-${{ matrix.php }},db-${{ matrix.database }},run-no-rmq-redis"
          name: "phpunit-without-rmq-redis-test-results-unit-php${{ matrix.php }}-${{ matrix.database }}"
